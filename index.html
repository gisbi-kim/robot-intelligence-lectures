<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Robot Intelligence Lectures</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:    #1F4E79;
      --blue-lt: #4A7FB5;
      --accent:  #D9531E;
      --bg:      #F2F4F7;
      --sidebar: 270px;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: #222;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    nav {
      width: var(--sidebar);
      background: var(--blue);
      color: #fff;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow-y: auto;
    }

    .nav-header {
      padding: 1.4rem 1.1rem 1rem;
      border-bottom: 1px solid rgba(255,255,255,.12);
    }
    .nav-header h1 {
      font-size: 1rem;
      font-weight: 700;
      line-height: 1.35;
      letter-spacing: -.01em;
    }
    .nav-header p {
      margin-top: .4rem;
      font-size: .72rem;
      opacity: .55;
      line-height: 1.5;
    }

    .nav-section { padding: .7rem 0 .4rem; }
    .nav-section-label {
      padding: .3rem 1.1rem;
      font-size: .65rem;
      text-transform: uppercase;
      letter-spacing: .09em;
      opacity: .45;
      font-weight: 600;
    }

    .nav-row { display: flex; align-items: stretch; }

    .nav-item {
      flex: 1;
      display: flex;
      align-items: center;
      gap: .5rem;
      padding: .52rem 1.1rem;
      font-size: .82rem;
      opacity: .8;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: background .12s, opacity .12s, border-color .12s;
      user-select: none;
    }
    .nav-item:hover  { background: rgba(255,255,255,.09); opacity: 1; }
    .nav-item.active { background: rgba(255,255,255,.13); opacity: 1; border-left-color: var(--accent); }
    .nav-item .icon  { font-size: 1em; flex-shrink: 0; }

    .nav-dl {
      display: flex;
      align-items: center;
      padding: 0 .7rem;
      color: rgba(255,255,255,.4);
      font-size: .8rem;
      text-decoration: none;
      flex-shrink: 0;
      transition: color .12s, background .12s;
      border-left: 1px solid rgba(255,255,255,.07);
    }
    .nav-dl:hover { color: #fff; background: rgba(255,255,255,.09); }

    .nav-footer {
      margin-top: auto;
      padding: .9rem 1.1rem;
      font-size: .68rem;
      opacity: .35;
      border-top: 1px solid rgba(255,255,255,.1);
      line-height: 1.6;
    }
    .nav-footer a { color: #fff; }

    /* ── Main area ── */
    main {
      flex: 1;
      overflow-y: auto;
      background: var(--bg);
      scroll-behavior: smooth;
    }

    #toolbar {
      position: sticky;
      top: 0;
      z-index: 10;
      background: #fff;
      border-bottom: 1px solid #dde1e7;
      padding: .55rem 1.2rem;
      display: flex;
      align-items: center;
      gap: .9rem;
      font-size: .8rem;
      color: #555;
    }
    #toolbar strong { color: #222; font-size: .85rem; }
    #toolbar span   { opacity: .6; }

    .toolbar-actions {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .toolbar-btn {
      font: inherit;
      padding: .25rem .65rem;
      border: 1px solid #cfd5dc;
      background: #fff;
      color: #333;
      border-radius: 3px;
      cursor: pointer;
      transition: background .12s, border-color .12s, color .12s;
    }
    .toolbar-btn:hover  { background: #f4f6f9; border-color: var(--accent); }
    .toolbar-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    #viewer {
      max-width: 960px;
      margin: 1.6rem auto 3rem;
      padding: 0 1.2rem;
    }
    #viewer.two-up {
      max-width: 1700px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: .6rem;
    }
    #viewer.two-up .page-wrap { margin-bottom: 0; }

    .page-wrap {
      position: relative;
      margin-bottom: .6rem;
      background: #fff;
      border-radius: 4px;
      box-shadow: 0 2px 14px rgba(0,0,0,.13);
      overflow: hidden;
    }
    .page-wrap canvas {
      width: 100%;
      display: block;
      background: #fff;
    }
    .page-num {
      position: absolute;
      bottom: .4rem;
      right: .6rem;
      font-size: .65rem;
      background: rgba(0,0,0,.38);
      color: #fff;
      padding: .15rem .45rem;
      border-radius: 3px;
      pointer-events: none;
      z-index: 2;
    }

    /* ── Text layer (enables text selection) ── */
    .textLayer {
      position: absolute;
      top: 0; left: 0;
      overflow: hidden;
      line-height: 1;
      z-index: 1;
    }
    .textLayer span,
    .textLayer br {
      color: transparent;
      position: absolute;
      white-space: pre;
      cursor: text;
      transform-origin: 0% 0%;
      user-select: text;
    }
    .textLayer ::selection      { background: rgba(0,100,255,.25); color: transparent; }
    .textLayer ::-moz-selection { background: rgba(0,100,255,.25); color: transparent; }

    #status {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 60vh;
      color: #8a9ab0;
      gap: .7rem;
      font-size: .9rem;
    }
    #status .big { font-size: 2.5rem; }

    .progress-bar {
      width: 220px;
      height: 3px;
      background: #dde1e7;
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width .15s;
    }
  </style>
</head>
<body>

<!-- ── Sidebar ── -->
<nav>
  <div class="nav-header">
    <h1>Robot Intelligence<br>Lectures</h1>
    <p>APRL, DGIST · Giseop Kim</p>
  </div>

  <div class="nav-section">
    <div class="nav-section-label">Lec 01 · VLA</div>
    <div class="nav-row">
      <div class="nav-item" data-pdf="pdf/lec01_vla_lecture.pdf" data-title="Lec 01 · VLA 모델 — 강의 슬라이드">
        <span class="icon">📊</span> 강의 슬라이드
      </div>
      <a class="nav-dl" href="pdf/lec01_vla_lecture.pdf" download title="PDF 다운로드">↓</a>
    </div>
    <div class="nav-row">
      <div class="nav-item" data-pdf="pdf/lec01_vla_script.pdf" data-title="Lec 01 · VLA 모델 — 발표 대본">
        <span class="icon">📝</span> 발표 대본
      </div>
      <a class="nav-dl" href="pdf/lec01_vla_script.pdf" download title="PDF 다운로드">↓</a>
    </div>
  </div>

  <div class="nav-section">
    <div class="nav-section-label">Lec 02 · JEPA</div>
    <div class="nav-row">
      <div class="nav-item" data-pdf="pdf/lec02_vla_lecture.pdf" data-title="Lec 02 · JEPA & 세계 모델 — 강의 슬라이드">
        <span class="icon">📊</span> 강의 슬라이드
      </div>
      <a class="nav-dl" href="pdf/lec02_vla_lecture.pdf" download title="PDF 다운로드">↓</a>
    </div>
    <div class="nav-row">
      <div class="nav-item" data-pdf="pdf/lec02_vla_script.pdf" data-title="Lec 02 · JEPA & 세계 모델 — 발표 대본">
        <span class="icon">📝</span> 발표 대본
      </div>
      <a class="nav-dl" href="pdf/lec02_vla_script.pdf" download title="PDF 다운로드">↓</a>
    </div>
  </div>

  <div class="nav-footer">
    Based on <a href="https://www.youtube.com/@WelchLabs" target="_blank">Welch Labs</a> videos.<br>
    <a href="https://github.com/gisbi-kim/robot-intelligence-lectures" target="_blank">GitHub ↗</a>
  </div>
</nav>

<!-- ── Main ── -->
<main id="main">
  <div id="toolbar" style="display:none">
    <strong id="toolbar-title"></strong>
    <div class="toolbar-actions">
      <button id="toggle-twoup" class="toolbar-btn" type="button" title="2쪽 보기 토글">2쪽</button>
      <span id="toolbar-pages"></span>
    </div>
  </div>

  <div id="status">
    <span class="big">🤖</span>
    <span>왼쪽 메뉴에서 강의를 선택하세요</span>
  </div>

  <div id="viewer"></div>
</main>

<script type="module">
  const pdfjsLib = await import('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.mjs');
  const { getDocument, GlobalWorkerOptions } = pdfjsLib;
  const renderTextLayer = pdfjsLib.renderTextLayer ?? pdfjsLib.default?.renderTextLayer;
  GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.worker.min.mjs';

  const viewer    = document.getElementById('viewer');
  const status    = document.getElementById('status');
  const toolbar   = document.getElementById('toolbar');
  const tbTitle   = document.getElementById('toolbar-title');
  const tbPages   = document.getElementById('toolbar-pages');
  const toggleBtn = document.getElementById('toggle-twoup');
  const main      = document.getElementById('main');

  // Bumped on every state change that should invalidate in-flight renders
  // (load swap, two-up toggle). Each renderSlot() captures the current
  // value and bails on every async boundary if it has changed.
  let renderGen = 0;
  let activeIO  = null;
  let current   = null;  // { pdf, slots, n }

  async function loadPDF(url, title) {
    renderGen++;
    if (activeIO) { activeIO.disconnect(); activeIO = null; }
    current = null;

    viewer.innerHTML = '';
    toolbar.style.display = 'none';
    status.innerHTML = `
      <span class="big">⏳</span>
      <span>로딩 중…</span>
      <div class="progress-bar"><div class="progress-fill" id="prog" style="width:0%"></div></div>`;
    status.style.display = 'flex';
    main.scrollTo(0, 0);

    const myGen = renderGen;

    try {
      const pdf = await getDocument(url).promise;
      if (myGen !== renderGen) return;

      const n = pdf.numPages;
      tbTitle.textContent = title;
      tbPages.textContent = `${n}페이지`;

      // fetch all page metadata in parallel — lightweight, just for viewports
      const pageObjs = await Promise.all(
        Array.from({ length: n }, (_, i) => pdf.getPage(i + 1))
      );
      if (myGen !== renderGen) return;

      // pre-allocate every page slot with its true aspect ratio.
      // CSS aspect-ratio handles both 1-up and 2-up widths automatically,
      // so no manual height recalc is needed when the grid toggles.
      const slots = pageObjs.map((page, idx) => {
        const i = idx + 1;
        const vp0 = page.getViewport({ scale: 1 });

        const wrap = document.createElement('div');
        wrap.className = 'page-wrap';
        wrap.style.aspectRatio = `${vp0.width} / ${vp0.height}`;
        wrap.dataset.idx = idx;

        const num = document.createElement('div');
        num.className = 'page-num';
        num.textContent = `${i} / ${n}`;
        wrap.appendChild(num);

        viewer.appendChild(wrap);
        return { page, wrap, vp0, i, rendered: false };
      });

      current = { pdf, slots, n };
      status.style.display = 'none';
      toolbar.style.display = 'flex';

      setupLazyRender();
    } catch (err) {
      if (myGen === renderGen) {
        status.innerHTML = `<span class="big">⚠️</span><span>오류: ${err.message}</span>`;
        status.style.display = 'flex';
      }
    }
  }

  function setupLazyRender() {
    if (!current) return;
    if (activeIO) activeIO.disconnect();
    activeIO = new IntersectionObserver((entries) => {
      for (const entry of entries) {
        if (!entry.isIntersecting) continue;
        const slot = current?.slots[Number(entry.target.dataset.idx)];
        if (slot) renderSlot(slot);
      }
    }, { root: main, rootMargin: '600px 0px' });
    for (const slot of current.slots) activeIO.observe(slot.wrap);
  }

  async function renderSlot(slot) {
    if (slot.rendered) return;
    slot.rendered = true;
    const myGen = renderGen;

    const { page, wrap, vp0 } = slot;
    // Measure live width — adapts to 1-up vs 2-up automatically.
    const cssW = wrap.getBoundingClientRect().width;
    if (!cssW) { slot.rendered = false; return; }

    const DPR      = Math.min(window.devicePixelRatio || 1, 2);
    const scale    = (cssW * DPR) / vp0.width;
    const vp       = page.getViewport({ scale });
    const cssScale = cssW / vp0.width;
    const vpCSS    = page.getViewport({ scale: cssScale });

    // remove any leftover canvas/text from a previous mode's render
    wrap.querySelector('canvas')?.remove();
    wrap.querySelector('.textLayer')?.remove();

    const canvas = document.createElement('canvas');
    canvas.width  = vp.width;
    canvas.height = vp.height;

    const textLayerDiv = document.createElement('div');
    textLayerDiv.className = 'textLayer';
    textLayerDiv.style.width  = vpCSS.width  + 'px';
    textLayerDiv.style.height = vpCSS.height + 'px';

    wrap.insertBefore(canvas, wrap.firstChild);
    wrap.insertBefore(textLayerDiv, canvas.nextSibling);

    try {
      await page.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise;
      if (myGen !== renderGen) return;

      if (typeof renderTextLayer === 'function') {
        const task = renderTextLayer({
          textContentSource: page.streamTextContent(),
          container: textLayerDiv,
          viewport: vpCSS,
        });
        task.promise?.catch(() => {});
      }
    } catch (e) {
      if (myGen === renderGen) slot.rendered = false;
    }
  }

  // Find topmost page currently visible in the main scroll area.
  function getTopVisibleIdx() {
    if (!current) return 0;
    const top = main.getBoundingClientRect().top;
    for (let i = 0; i < current.slots.length; i++) {
      const r = current.slots[i].wrap.getBoundingClientRect();
      if (r.bottom > top + 40) return i;
    }
    return 0;
  }

  function setTwoUp(enabled) {
    if (!current) {
      viewer.classList.toggle('two-up', enabled);
      toggleBtn.classList.toggle('active', enabled);
      toggleBtn.textContent = enabled ? '1쪽' : '2쪽';
      return;
    }

    const topIdx = getTopVisibleIdx();

    renderGen++;  // kill any in-flight renders from the old layout
    viewer.classList.toggle('two-up', enabled);
    toggleBtn.classList.toggle('active', enabled);
    toggleBtn.textContent = enabled ? '1쪽' : '2쪽';

    // reset slots so canvases get regenerated at the new resolution
    for (const slot of current.slots) {
      slot.rendered = false;
      slot.wrap.querySelector('canvas')?.remove();
      slot.wrap.querySelector('.textLayer')?.remove();
    }

    // wait one frame so the grid layout settles before we measure widths
    requestAnimationFrame(() => {
      setupLazyRender();
      current?.slots[topIdx]?.wrap.scrollIntoView({ block: 'start' });
    });
  }

  toggleBtn.addEventListener('click', () => {
    setTwoUp(!viewer.classList.contains('two-up'));
  });

  document.querySelectorAll('.nav-item').forEach(item => {
    item.addEventListener('click', () => {
      document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
      item.classList.add('active');
      loadPDF(item.dataset.pdf, item.dataset.title);
    });
  });

  const first = document.querySelector('.nav-item');
  first.classList.add('active');
  loadPDF(first.dataset.pdf, first.dataset.title);
</script>
</body>
</html>
